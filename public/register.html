<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Registrarse • Instagram</title>
    <link rel="stylesheet" href="styles.css" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.0.0/css/all.min.css"
    />
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="firebase-config.js"></script>
    <script src="firebase-client.js"></script>
  </head>
  <body>
    <div class="auth-container">
      <div class="auth-box">
        <h1>Instagram</h1>
        <p style="color: #8e8e8e; font-weight: 600; margin-bottom: 20px">
          Regístrate para ver fotos y videos de tus amigos.
        </p>
        <form id="registerForm">
          <div class="form-group">
            <input
              type="email"
              id="email"
              placeholder="Correo electrónico"
              required
            />
            <small class="field-hint" id="emailHint"></small>
          </div>
          <div class="form-group">
            <input
              type="text"
              id="username"
              placeholder="Nombre de usuario"
              required
            />
            <small class="field-hint"
              >3-30 caracteres, sin caracteres especiales</small
            >
          </div>
          <div class="form-group">
            <input
              type="password"
              id="password"
              placeholder="Contraseña"
              required
            />
            <small class="field-hint"
              >Min 8 caracteres, mayúsculas, minúsculas y números</small
            >
          </div>
          <button type="submit" id="registerBtn" class="auth-button">
            <span id="btnText">Registrarte</span>
            <i
              id="btnLoader"
              class="fas fa-spinner fa-spin"
              style="display: none; margin-left: 8px"
            ></i>
          </button>
        </form>
        <div id="message" class="message"></div>
      </div>
      <div class="switch-auth">
        <p>¿Tienes una cuenta? <a href="login.html">Entrar</a></p>
      </div>
    </div>
    <script src="auth.js"></script>
  </body>
</html>

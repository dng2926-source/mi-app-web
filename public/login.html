<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Iniciar Sesión • Instagram</title>
    <link rel="stylesheet" href="styles.css" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.0.0/css/all.min.css"
    />
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="firebase-config.js"></script>
    <script src="firebase-client.js"></script>
  </head>
  <body>
    <div class="auth-container">
      <div class="auth-box">
        <h1>Instagram</h1>
        <form id="loginForm">
          <div class="form-group">
            <input
              type="email"
              id="email"
              placeholder="Teléfono, usuario o correo electrónico"
              required
            />
          </div>
          <div class="form-group">
            <input
              type="password"
              id="password"
              placeholder="Contraseña"
              required
            />
          </div>
          <button type="submit" id="loginBtn" class="auth-button">
            <span id="btnText">Entrar</span>
            <i
              id="btnLoader"
              class="fas fa-spinner fa-spin"
              style="display: none; margin-left: 8px"
            ></i>
          </button>
        </form>
        <div id="message" class="message"></div>
      </div>
      <div class="switch-auth">
        <p>¿No tienes una cuenta? <a href="register.html">Regístrate</a></p>
      </div>
    </div>
    <script src="auth.js"></script>
  </body>
</html>
